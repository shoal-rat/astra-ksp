// MechJeb-for-all: add a MechJebCore to every command pod so the KspAutomationBridge MechJeb
// endpoints (/mj-rendezvous, /mj-dock) work on render()-generated craft that don't carry an AR202
// MechJeb part. Without this, Vessel.GetMasterMechJeb() returns null and MechJeb cannot be driven.
//
// Requires ModuleManager (already installed) and a KSP reload to take effect. Install this file
// alongside the bridge DLL at GameData/KspAutomationBridge/MechJebForAll.cfg.
//
// ModuleManager applies this to part PREFABS at load, so vessels already saved in flight also gain
// the core when the save is reloaded after install.
@PART[*]:HAS[@MODULE[ModuleCommand],!MODULE[MechJebCore]]:FINAL
{
	MODULE
	{
		name = MechJebCore
	}
}
