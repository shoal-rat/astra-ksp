<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#070A16"/>
    </linearGradient>
    <linearGradient id="cyanL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103048"/>
      <stop offset="1" stop-color="#0C2236"/>
    </linearGradient>
    <linearGradient id="magL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A1430"/>
      <stop offset="1" stop-color="#2A0E24"/>
    </linearGradient>
    <linearGradient id="amberL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2C10"/>
      <stop offset="1" stop-color="#2A2009"/>
    </linearGradient>
    <linearGradient id="slateL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2236"/>
      <stop offset="1" stop-color="#121A2C"/>
    </linearGradient>
    <filter id="glowL" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softL" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <marker id="aCyL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#38BDF8"/>
    </marker>
    <marker id="aMaL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F472B6"/>
    </marker>
    <marker id="aAmL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FBBF24"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bgL)"/>
  <!-- stars -->
  <g fill="#94A3B8" opacity="0.5">
    <circle cx="130" cy="76" r="1.1"/><circle cx="320" cy="50" r="0.9"/><circle cx="540" cy="92" r="1.3"/>
    <circle cx="780" cy="58" r="0.9"/><circle cx="1000" cy="98" r="1.1"/><circle cx="1120" cy="54" r="1.2"/>
    <circle cx="60" cy="360" r="1"/><circle cx="1150" cy="320" r="1.1"/><circle cx="210" cy="662" r="0.9"/>
    <circle cx="650" cy="654" r="1.2"/><circle cx="1060" cy="648" r="1"/><circle cx="430" cy="640" r="0.8"/>
    <circle cx="900" cy="662" r="1"/><circle cx="80" cy="200" r="0.9"/>
  </g>

  <!-- title -->
  <text x="48" y="56" fill="#E2E8F0" font-size="30" font-weight="700">ASTRA — LLM-native Pipeline</text>
  <text x="48" y="84" fill="#7DD3FC" font-size="15">The model reasons over your skills + primitives; you never script the mission.</text>

  <!-- ===== NL COMMAND ===== -->
  <g filter="url(#softL)">
    <rect x="48" y="300" width="190" height="96" rx="14" fill="url(#cyanL)" stroke="#38BDF8" stroke-width="1.6"/>
  </g>
  <text x="143" y="335" text-anchor="middle" fill="#E2E8F0" font-size="14.5" font-weight="700">NL command</text>
  <text x="143" y="357" text-anchor="middle" fill="#7DD3FC" font-size="11">"land a relay and</text>
  <text x="143" y="374" text-anchor="middle" fill="#7DD3FC" font-size="11">bring a crew home"</text>

  <!-- ===== ORCHESTRATOR ===== -->
  <g filter="url(#softL)">
    <rect x="300" y="262" width="262" height="172" rx="16" fill="url(#magL)" stroke="#F472B6" stroke-width="2.2"/>
  </g>
  <text x="431" y="294" text-anchor="middle" fill="#E2E8F0" font-size="18" font-weight="700">LLM ORCHESTRATOR</text>
  <text x="431" y="316" text-anchor="middle" fill="#F9A8D4" font-size="11.5">reads skills/ as its playbook</text>
  <line x1="324" y1="328" x2="538" y2="328" stroke="#F472B6" stroke-width="1" opacity="0.4"/>
  <text x="431" y="348" text-anchor="middle" fill="#FBCFE8" font-size="11.5">· splits mission into phases</text>
  <text x="431" y="368" text-anchor="middle" fill="#FBCFE8" font-size="11.5">· calculates Δv / TWR budgets</text>
  <text x="431" y="388" text-anchor="middle" fill="#FBCFE8" font-size="11.5">· diagnoses a failed phase</text>
  <text x="431" y="412" text-anchor="middle" fill="#F472B6" font-size="10.5" opacity="0.85">the reasoning layer — no hard-coded plan</text>

  <!-- ===== EXECUTOR SUBAGENTS ===== -->
  <g filter="url(#softL)">
    <rect x="630" y="250" width="270" height="196" rx="16" fill="url(#cyanL)" stroke="#38BDF8" stroke-width="2.2"/>
  </g>
  <text x="765" y="280" text-anchor="middle" fill="#E2E8F0" font-size="17" font-weight="700">EXECUTOR SUBAGENTS</text>
  <text x="765" y="300" text-anchor="middle" fill="#7DD3FC" font-size="11">one subagent flies one phase</text>
  <!-- stacked phase chips -->
  <g>
    <rect x="652" y="312" width="226" height="30" rx="7" fill="#0A1A2C" stroke="#38BDF8" stroke-width="1.1"/>
    <text x="666" y="332" fill="#BAE6FD" font-size="11.5">ascend-to-orbit</text>
    <text x="864" y="332" text-anchor="end" fill="#86EFAC" font-size="10.5">✓ marker</text>
    <rect x="652" y="348" width="226" height="30" rx="7" fill="#0A1A2C" stroke="#38BDF8" stroke-width="1.1"/>
    <text x="666" y="368" fill="#BAE6FD" font-size="11.5">hoverslam-landing</text>
    <text x="864" y="368" text-anchor="end" fill="#86EFAC" font-size="10.5">✓ marker</text>
    <rect x="652" y="384" width="226" height="30" rx="7" fill="#0A1A2C" stroke="#F472B6" stroke-width="1.1"/>
    <text x="666" y="404" fill="#FBCFE8" font-size="11.5">return-and-reentry</text>
    <text x="864" y="404" text-anchor="end" fill="#F9A8D4" font-size="10.5">✗ retry</text>
  </g>
  <text x="765" y="434" text-anchor="middle" fill="#7DD3FC" font-size="10.5" opacity="0.85">each retries until its success marker fires</text>

  <!-- ===== FLIGHT PRIMITIVES ===== -->
  <g filter="url(#softL)">
    <rect x="630" y="500" width="270" height="120" rx="16" fill="url(#amberL)" stroke="#FBBF24" stroke-width="2.2"/>
  </g>
  <text x="765" y="530" text-anchor="middle" fill="#E2E8F0" font-size="16" font-weight="700">FLIGHT PRIMITIVES</text>
  <text x="765" y="552" text-anchor="middle" fill="#FCD34D" font-size="11.5">flight_controller · guidance</text>
  <text x="765" y="570" text-anchor="middle" fill="#FCD34D" font-size="11.5">craft_writer</text>
  <text x="765" y="592" text-anchor="middle" fill="#FDE68A" font-size="11" opacity="0.9">deterministic Python you write &amp; test</text>
  <text x="765" y="610" text-anchor="middle" fill="#FBBF24" font-size="10.5" opacity="0.8">over kRPC</text>

  <!-- ===== KSP1 ===== -->
  <g filter="url(#softL)">
    <rect x="980" y="500" width="172" height="120" rx="16" fill="url(#amberL)" stroke="#FBBF24" stroke-width="2"/>
  </g>
  <text x="1066" y="546" text-anchor="middle" fill="#E2E8F0" font-size="17" font-weight="700">KSP1</text>
  <text x="1066" y="570" text-anchor="middle" fill="#FCD34D" font-size="11.5">the live game</text>
  <text x="1066" y="590" text-anchor="middle" fill="#FDE68A" font-size="10.5" opacity="0.85">kRPC :50000</text>

  <!-- ===== LEDGER + SKILLS (feed the orchestrator) ===== -->
  <text x="300" y="150" fill="#94A3B8" font-size="13" font-weight="600" letter-spacing="1.4">WHAT FEEDS THE ORCHESTRATOR'S REASONING</text>
  <g filter="url(#softL)">
    <rect x="300" y="162" width="190" height="74" rx="13" fill="url(#slateL)" stroke="#38BDF8" stroke-width="1.4"/>
  </g>
  <text x="395" y="192" text-anchor="middle" fill="#E2E8F0" font-size="13.5" font-weight="700">Experience Ledger</text>
  <text x="395" y="213" text-anchor="middle" fill="#7DD3FC" font-size="11">every past attempt + fix</text>

  <g filter="url(#softL)">
    <rect x="510" y="162" width="190" height="74" rx="13" fill="url(#slateL)" stroke="#F472B6" stroke-width="1.4"/>
  </g>
  <text x="605" y="192" text-anchor="middle" fill="#E2E8F0" font-size="13.5" font-weight="700">skills/</text>
  <text x="605" y="213" text-anchor="middle" fill="#F9A8D4" font-size="11">the mission playbook</text>

  <!-- ===== FLOWS ===== -->
  <!-- NL -> orchestrator -->
  <line x1="238" y1="348" x2="294" y2="348" stroke="#38BDF8" stroke-width="2.6" marker-end="url(#aCyL)"/>

  <!-- orchestrator -> executors -->
  <path d="M562,338 L624,338" fill="none" stroke="#F472B6" stroke-width="2.6" marker-end="url(#aMaL)"/>
  <text x="593" y="328" text-anchor="middle" fill="#F9A8D4" font-size="10.5">dispatch phases</text>

  <!-- executors -> primitives -->
  <line x1="765" y1="446" x2="765" y2="494" stroke="#FBBF24" stroke-width="2.6" marker-end="url(#aAmL)"/>
  <text x="778" y="476" fill="#FCD34D" font-size="10.5">call primitives</text>

  <!-- primitives -> KSP -->
  <line x1="900" y1="560" x2="974" y2="560" stroke="#FBBF24" stroke-width="2.8" marker-end="url(#aAmL)"/>
  <!-- KSP -> primitives telemetry (return) -->
  <path d="M980,594 L902,594" fill="none" stroke="#FBBF24" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#aAmL)"/>
  <text x="941" y="612" text-anchor="middle" fill="#FCD34D" font-size="10">telemetry</text>

  <!-- ledger + skills feed orchestrator -->
  <path d="M395,236 L420,256" fill="none" stroke="#38BDF8" stroke-width="2" opacity="0.9" marker-end="url(#aCyL)"/>
  <path d="M600,236 L470,258" fill="none" stroke="#F472B6" stroke-width="2" opacity="0.9" marker-end="url(#aMaL)"/>

  <!-- RETRY LOOP: failed phase -> diagnosis (orchestrator) -> back to executors -->
  <path d="M652,399 Q430,470 360,460 Q300,452 300,400"
        fill="none" stroke="#F472B6" stroke-width="2.4" stroke-dasharray="8 5" marker-end="url(#aMaL)"/>
  <text x="470" y="486" text-anchor="middle" fill="#F472B6" font-size="11.5" font-weight="700">failed phase → diagnose → refly one fix</text>

  <!-- caption -->
  <g transform="translate(0,672)">
    <text x="600" y="0" text-anchor="middle" fill="#E2E8F0" font-size="14.5" font-weight="700">You write skills + primitives; the LLM does the rest.</text>
  </g>

  <!-- legend -->
  <g transform="translate(940,150)" font-size="11.5">
    <rect x="0" y="-12" width="13" height="13" rx="3" fill="url(#magL)" stroke="#F472B6"/>
    <text x="20" y="-1" fill="#CBD5E1">Reason</text>
    <rect x="0" y="10" width="13" height="13" rx="3" fill="url(#cyanL)" stroke="#38BDF8"/>
    <text x="20" y="21" fill="#CBD5E1">Execute</text>
    <rect x="0" y="32" width="13" height="13" rx="3" fill="url(#amberL)" stroke="#FBBF24"/>
    <text x="20" y="43" fill="#CBD5E1">Deterministic / live</text>
  </g>
</svg>
