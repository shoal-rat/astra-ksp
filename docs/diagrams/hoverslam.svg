<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#070A16"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A3550"/>
      <stop offset="1" stop-color="#141B2C"/>
    </linearGradient>
    <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="g4" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft4" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
    <marker id="flame" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#FBBF24"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg4)"/>
  <g fill="#94A3B8" opacity="0.4">
    <circle cx="180" cy="90" r="1"/><circle cx="520" cy="60" r="1.1"/><circle cx="900" cy="80" r="0.9"/>
    <circle cx="1080" cy="140" r="1"/><circle cx="320" cy="120" r="0.8"/><circle cx="1130" cy="300" r="0.9"/>
  </g>

  <text x="48" y="52" fill="#E2E8F0" font-size="29" font-weight="700">ASTRA — Hoverslam Descent Profile</text>
  <text x="48" y="80" fill="#7DD3FC" font-size="14.5">Falcon-9-style suicide burn · speed tracks the reference curve v_ref(h) = √(2·(0.92·a_max − g)·h)</text>

  <!-- ===== PLOT FRAME ===== -->
  <!-- plot region: x 130..1060, y 130..560.  origin (ground, 0 speed) at (130,560) -->
  <!-- gridlines -->
  <g stroke="#1C2740" stroke-width="1">
    <line x1="130" y1="130" x2="1060" y2="130"/>
    <line x1="130" y1="216" x2="1060" y2="216"/>
    <line x1="130" y1="302" x2="1060" y2="302"/>
    <line x1="130" y1="388" x2="1060" y2="388"/>
    <line x1="130" y1="474" x2="1060" y2="474"/>
    <line x1="316" y1="130" x2="316" y2="560"/>
    <line x1="502" y1="130" x2="502" y2="560"/>
    <line x1="688" y1="130" x2="688" y2="560"/>
    <line x1="874" y1="130" x2="874" y2="560"/>
  </g>

  <!-- axes -->
  <line x1="130" y1="560" x2="130" y2="120" stroke="#94A3B8" stroke-width="2" marker-end="url(#ax)"/>
  <line x1="130" y1="560" x2="1070" y2="560" stroke="#94A3B8" stroke-width="2" marker-end="url(#ax)"/>

  <!-- axis labels -->
  <text x="92" y="120" fill="#E2E8F0" font-size="14" font-weight="700" text-anchor="end">Altitude h</text>
  <text x="92" y="138" fill="#94A3B8" font-size="11" text-anchor="end">(m, ↑)</text>
  <text x="1070" y="588" fill="#E2E8F0" font-size="14" font-weight="700" text-anchor="end">Speed |v|  (m/s, →)</text>

  <!-- y ticks -->
  <g fill="#94A3B8" font-size="11" text-anchor="end">
    <text x="122" y="135">2000</text>
    <text x="122" y="221">1500</text>
    <text x="122" y="307">1000</text>
    <text x="122" y="393">500</text>
    <text x="122" y="479">200</text>
    <text x="122" y="564">0</text>
  </g>
  <!-- x ticks -->
  <g fill="#94A3B8" font-size="11" text-anchor="middle">
    <text x="130" y="580">0</text>
    <text x="316" y="580">100</text>
    <text x="502" y="580">200</text>
    <text x="688" y="580">300</text>
    <text x="874" y="580">400</text>
  </g>

  <!-- ground -->
  <rect x="130" y="560" width="930" height="36" fill="url(#ground)"/>
  <text x="595" y="583" text-anchor="middle" fill="#CBD5E1" font-size="12" font-weight="600" letter-spacing="2">SURFACE</text>

  <!-- ===== REFERENCE CURVE v_ref(h) = sqrt(2 a h) ===== -->
  <!-- Parabola in (v, h): h ∝ v^2. Plot from ground(130,560) up to high alt.
       Scale: 400 m/s -> x 874 (744px / 400 = 1.86 px per m/s).
       2000 m -> y 130 (560-130=430px for 2000m => 0.215 px/m).
       v_ref at h=2000 ~ 460 m/s; cap displayed curve at the top edge. -->
  <!-- filled area under curve -->
  <path d="M130,560
           C 360,556 560,520 690,460
           C 800,408 880,330 935,236
           C 968,178 985,150 992,130
           L130,130 Z" fill="url(#curveFill)"/>

  <!-- the reference curve itself (the "speed limit" line the burn tracks) -->
  <path d="M130,560
           C 360,556 560,520 690,460
           C 800,408 880,330 935,236
           C 968,178 985,150 992,130"
        fill="none" stroke="#38BDF8" stroke-width="2.4" stroke-dasharray="9 6"/>
  <text x="998" y="150" fill="#7DD3FC" font-size="12.5" font-weight="700">v_ref(h)</text>
  <text x="998" y="168" fill="#7DD3FC" font-size="10.5">braking speed limit</text>

  <!-- ===== FREEFALL SEGMENT (engine off) =====
       Real vertical free-fall: v grows with sqrt(h) too, but BELOW the curve until ignition.
       Craft starts high & fast-ish but accelerating; here we draw the actual fall path that
       rises toward the curve and MEETS it at the ignition point (≈ 690,460). -->
  <path d="M965,130
           C 930,200 870,280 820,340
           C 770,398 720,438 690,460"
        fill="none" stroke="#F472B6" stroke-width="3" stroke-linecap="round"/>
  <!-- freefall label -->
  <g transform="translate(845,250)">
    <rect x="-8" y="-22" width="186" height="46" rx="9" fill="#2A0E24" stroke="#F472B6" stroke-width="1.3" opacity="0.95"/>
    <text x="85" y="-4" text-anchor="middle" fill="#F9A8D4" font-size="12.5" font-weight="700">FREEFALL · engine off</text>
    <text x="85" y="14" text-anchor="middle" fill="#F472B6" font-size="10.5">below the limit, accelerating</text>
  </g>

  <!-- ===== IGNITION POINT ===== -->
  <g filter="url(#g4)">
    <circle cx="690" cy="460" r="9" fill="#FBBF24" stroke="#FDE68A" stroke-width="2"/>
  </g>
  <line x1="690" y1="460" x2="600" y2="392" stroke="#FBBF24" stroke-width="1.4" stroke-dasharray="3 3"/>
  <g transform="translate(430,360)">
    <rect x="0" y="-24" width="178" height="48" rx="9" fill="#2A2009" stroke="#FBBF24" stroke-width="1.4"/>
    <text x="89" y="-6" text-anchor="middle" fill="#FDE68A" font-size="12.5" font-weight="700">★ IGNITION</text>
    <text x="89" y="13" text-anchor="middle" fill="#FCD34D" font-size="10.5">actual v meets v_ref(h)</text>
  </g>

  <!-- ===== FULL-THROTTLE BRAKE SEGMENT (tracks the curve down) ===== -->
  <!-- overlay a solid amber line ON the curve from ignition down to touchdown -->
  <path d="M690,460
           C 560,520 360,556 130,560"
        fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/>
  <!-- little flame arrows along the brake -->
  <g stroke="#FB923C" stroke-width="2">
    <line x1="560" y1="528" x2="560" y2="544" marker-end="url(#flame)"/>
    <line x1="430" y1="548" x2="430" y2="564" marker-end="url(#flame)"/>
    <line x1="300" y1="555" x2="300" y2="571" marker-end="url(#flame)"/>
  </g>
  <g transform="translate(300,452)">
    <rect x="0" y="-24" width="232" height="48" rx="9" fill="#2A2009" stroke="#FBBF24" stroke-width="1.4"/>
    <text x="116" y="-6" text-anchor="middle" fill="#FDE68A" font-size="12.5" font-weight="700">FULL-THROTTLE BRAKE</text>
    <text x="116" y="13" text-anchor="middle" fill="#FCD34D" font-size="10.5">throttle pinned, speed rides v_ref down</text>
  </g>
  <line x1="300" y1="476" x2="380" y2="540" stroke="#FBBF24" stroke-width="1.4" stroke-dasharray="3 3"/>

  <!-- ===== TOUCHDOWN ===== -->
  <g filter="url(#g4)">
    <circle cx="130" cy="560" r="9" fill="#22D3A0" stroke="#A7F3D0" stroke-width="2"/>
  </g>
  <g transform="translate(150,604)">
    <rect x="0" y="-22" width="234" height="44" rx="9" fill="#0E2A22" stroke="#22D3A0" stroke-width="1.5"/>
    <text x="117" y="-3" text-anchor="middle" fill="#86EFAC" font-size="12.5" font-weight="700">TOUCHDOWN · 0 m/s at surface</text>
    <text x="117" y="15" text-anchor="middle" fill="#22D3A0" font-size="10.5">curve and ground meet at the origin</text>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(700,210)" font-size="12.5">
    <rect x="-14" y="-26" width="318" height="150" rx="12" fill="#0E1830" stroke="#1E2A44" stroke-width="1.3" opacity="0.96"/>
    <text x="0" y="-4" fill="#E2E8F0" font-size="13.5" font-weight="700">How the suicide burn works</text>

    <line x1="2" y1="22" x2="34" y2="22" stroke="#38BDF8" stroke-width="2.4" stroke-dasharray="9 6"/>
    <text x="44" y="26" fill="#CBD5E1">v_ref(h): max safe speed at height h</text>

    <line x1="2" y1="48" x2="34" y2="48" stroke="#F472B6" stroke-width="3"/>
    <text x="44" y="52" fill="#CBD5E1">freefall — engine off, v &lt; v_ref</text>

    <circle cx="18" cy="74" r="6" fill="#FBBF24"/>
    <text x="44" y="78" fill="#CBD5E1">ignition the instant v = v_ref(h)</text>

    <line x1="2" y1="100" x2="34" y2="100" stroke="#FBBF24" stroke-width="4"/>
    <text x="44" y="104" fill="#CBD5E1">full-throttle brake riding the curve</text>
  </g>

  <!-- formula footnote -->
  <text x="48" y="660" fill="#94A3B8" font-size="12">a_max = max engine accel · g = local gravity · 0.92 = throttle margin. The agent computes the ignition altitude each tick so v → 0 exactly as h → 0.</text>
</svg>
