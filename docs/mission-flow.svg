<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="cyc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <style>
    .node  { rx: 14; stroke-width: 2; }
    .ntitle{ font-size: 16px; font-weight: 700; fill: #ffffff; }
    .nsub  { font-size: 12px; fill: #ede9fe; }
    .ring  { stroke: #7c3aed; stroke-width: 2.4; fill: none; }
    .hub   { font-size: 15px; font-weight: 700; fill: #ffffff; }
    .hub2  { font-size: 12px; fill: #e2e8f0; }
  </style>

  <!-- center hub -->
  <circle cx="380" cy="360" r="92" fill="#4c1d95" stroke="#6d28d9" stroke-width="2"/>
  <text x="380" y="345" text-anchor="middle" class="hub">LLM-native loop</text>
  <text x="380" y="368" text-anchor="middle" class="hub2">a loop + an</text>
  <text x="380" y="385" text-anchor="middle" class="hub2">experience notebook</text>
  <text x="380" y="405" text-anchor="middle" class="hub2">(Claude Code)</text>

  <!-- 7 steps around the cycle. Boxes positioned clockwise from top. -->

  <!-- 1 Divide task (top) -->
  <rect x="270" y="20" width="220" height="68" class="node" fill="#6d28d9" stroke="#4c1d95"/>
  <text x="380" y="48" text-anchor="middle" class="ntitle">1 · Divide the task</text>
  <text x="380" y="68" text-anchor="middle" class="nsub">one-line goal -&gt; ordered steps</text>

  <!-- 2 Research (top right) -->
  <rect x="520" y="120" width="220" height="68" class="node" fill="#5b21b6" stroke="#4c1d95"/>
  <text x="630" y="148" text-anchor="middle" class="ntitle">2 · Research</text>
  <text x="630" y="168" text-anchor="middle" class="nsub">how is it normally done?</text>

  <!-- 3 Pick API (right) -->
  <rect x="540" y="326" width="220" height="68" class="node" fill="#7c3aed" stroke="#5b21b6"/>
  <text x="650" y="354" text-anchor="middle" class="ntitle">3 · Pick the API</text>
  <text x="650" y="374" text-anchor="middle" class="nsub">right MechJeb / kRPC call</text>

  <!-- 4 Design ship (bottom right) -->
  <rect x="500" y="520" width="220" height="68" class="node" fill="#6d28d9" stroke="#4c1d95"/>
  <text x="610" y="548" text-anchor="middle" class="ntitle">4 · Design the ship</text>
  <text x="610" y="568" text-anchor="middle" class="nsub">minimal craft for the step</text>

  <!-- 5 Fly autopilot (bottom) -->
  <rect x="270" y="624" width="220" height="68" class="node" fill="#7c3aed" stroke="#5b21b6"/>
  <text x="380" y="652" text-anchor="middle" class="ntitle">5 · Fly the autopilot</text>
  <text x="380" y="672" text-anchor="middle" class="nsub">one-by-one + warp-assist</text>

  <!-- 6 Verify (bottom left) -->
  <rect x="40" y="520" width="220" height="68" class="node" fill="#6d28d9" stroke="#4c1d95"/>
  <text x="150" y="548" text-anchor="middle" class="ntitle">6 · Verify the result</text>
  <text x="150" y="568" text-anchor="middle" class="nsub">poll telemetry / mj-status</text>

  <!-- 7 Record lesson (left) -->
  <rect x="0" y="326" width="220" height="68" class="node" fill="#5b21b6" stroke="#4c1d95"/>
  <text x="110" y="354" text-anchor="middle" class="ntitle">7 · Record the lesson</text>
  <text x="110" y="374" text-anchor="middle" class="nsub">notebook + experience ledger</text>

  <!-- retry hint (top left) -->
  <rect x="20" y="120" width="220" height="68" class="node" fill="#334155" stroke="#1e293b"/>
  <text x="130" y="148" text-anchor="middle" class="ntitle" font-size="15px">on failure: diagnose</text>
  <text x="130" y="168" text-anchor="middle" class="nsub" fill="#cbd5e1">adjust ONE thing -&gt; retry</text>

  <!-- cycle arrows (clockwise, following the ring) -->
  <path d="M492,58 C580,72 645,92 686,118" class="ring" marker-end="url(#cyc)"/>            <!-- 1 -> 2 -->
  <path d="M718,190 C742,238 730,288 705,324" class="ring" marker-end="url(#cyc)"/>          <!-- 2 -> 3 -->
  <path d="M652,396 C652,440 640,484 624,518" class="ring" marker-end="url(#cyc)"/>          <!-- 3 -> 4 -->
  <path d="M572,590 C535,625 470,648 412,652" class="ring" marker-end="url(#cyc)"/>          <!-- 4 -> 5 -->
  <path d="M348,652 C290,648 225,625 188,590" class="ring" marker-end="url(#cyc)"/>          <!-- 5 -> 6 -->
  <path d="M136,518 C120,484 108,440 108,396" class="ring" marker-end="url(#cyc)"/>          <!-- 6 -> 7 -->
  <path d="M108,324 C108,275 122,228 150,192" class="ring" marker-end="url(#cyc)" stroke-dasharray="6 5"/>  <!-- 7 -> diagnose -->
  <path d="M242,150 C258,108 262,84 286,66" class="ring" marker-end="url(#cyc)"/>            <!-- diagnose -> 1 -->
</svg>
