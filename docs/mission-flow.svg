<svg viewBox="0 0 980 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/></marker>
    <marker id="retry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/></marker>
    <marker id="fail" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/></marker>
    <radialGradient id="bg" cx="50%" cy="40%" r="78%"><stop offset="0%" stop-color="#0e1626"/><stop offset="100%" stop-color="#070b14"/></radialGradient>
    <linearGradient id="gLaunch" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="gCruise" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#155e75"/></linearGradient>
    <linearGradient id="gBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#5b21b6"/></linearGradient>
    <linearGradient id="gHome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
  </defs>
  <rect x="0" y="0" width="980" height="720" rx="16" fill="url(#bg)"/>
  <style>
    .h    { font-size: 19px; font-weight: 800; fill: #f8fafc; }
    .sub  { font-size: 12.5px; fill: #cbd5e1; }
    .lay  { font-size: 11.5px; font-weight: 800; fill: #7c8aa0; letter-spacing: .1em; }
    .pt   { font-size: 14.5px; font-weight: 800; fill: #ffffff; }
    .pw   { font-size: 10.5px; fill: #e2e8f0; }
    .pwr  { font-size: 10.5px; fill: #ccfbf1; font-style: italic; }
    .opt  { font-size: 10px; fill: #94a3b8; font-weight: 700; }
    .lab  { font-size: 11px; fill: #b45309; font-weight: 700; }
    .flab { font-size: 11px; fill: #ef4444; font-weight: 700; }
    .tag  { font-size: 9.5px; font-weight: 800; fill: #052e2b; }
  </style>

  <text x="40" y="40" class="h">A decomposed mission, in flight order</text>
  <text x="40" y="63" class="sub">Body-agnostic primitives, sequenced by the architect. The same chain serves a relay, a lander, or a crewed round trip &#8212;</text>
  <text x="40" y="81" class="sub">only the args (target body, altitude, capture mode, crew) change. Steps not needed for a goal are simply omitted.</text>

  <!-- ON THE GROUND -->
  <text x="40" y="120" class="lay">ON THE GROUND</text>
  <rect x="40" y="132" width="270" height="120" rx="13" fill="url(#gLaunch)" stroke="#115e59"/>
  <rect x="56" y="146" width="96" height="16" rx="8" fill="#a3e635"/><text x="62" y="158" class="tag">PNG + CODEX</text>
  <text x="56" y="184" class="pt">launch</text>
  <text x="56" y="204" class="pw">design (split stages / side boosters)</text>
  <text x="56" y="220" class="pw">+ ascend to a Kerbin parking orbit</text>
  <text x="56" y="238" class="pwr">three-view PNG &#8594; gate + Codex review</text>

  <!-- IN CRUISE -->
  <text x="355" y="120" class="lay">INTERPLANETARY / MOON LEG</text>
  <rect x="355" y="132" width="270" height="120" rx="13" fill="url(#gCruise)" stroke="#155e75"/>
  <text x="371" y="158" class="pt">transfer &#183; jettison_transfer_stage</text>
  <text x="371" y="180" class="pw">wait for the window, warp to ut_dep,</text>
  <text x="371" y="196" class="pw">eject + capture, then DROP the spent</text>
  <text x="371" y="212" class="pw">transfer stage &#8212; the short lander goes on</text>
  <text x="371" y="232" class="pwr">circular &#183; loose &#183; aerocapture</text>

  <!-- AT THE BODY -->
  <text x="670" y="120" class="lay">AT THE TARGET BODY</text>
  <rect x="670" y="132" width="270" height="120" rx="13" fill="url(#gBody)" stroke="#4c1d95"/>
  <text x="686" y="160" class="pt">land &#183; plant_flag &#183; walk_to</text>
  <text x="686" y="184" class="pw">descend on the live gravity/atmosphere,</text>
  <text x="686" y="200" class="pw">EVA a kerbal, plant the stock flag,</text>
  <text x="686" y="216" class="pw">walk a calculated great-circle move</text>
  <text x="686" y="238" class="opt">or: commission_relay &#183; rendezvous + dock</text>

  <!-- COMING HOME -->
  <text x="355" y="330" class="lay">COMING HOME</text>
  <rect x="355" y="342" width="585" height="116" rx="13" fill="url(#gHome)" stroke="#92400e"/>
  <text x="371" y="370" class="pt">ascend  &#8594;  transfer (home)  &#8594;  recover</text>
  <text x="371" y="394" class="pw">climb back to orbit of the body, take the return window to Kerbin,</text>
  <text x="371" y="412" class="pw">aerocapture / chutes down, and recover the vessel &amp; crew on the home body.</text>
  <text x="371" y="436" class="pwr">a one-way relay stops after capture; a round trip flies all three.</text>

  <!-- EXECUTOR FOOTER -->
  <text x="40" y="512" class="lay">THE EXECUTOR AROUND EVERY STEP  (agent.py)</text>
  <rect x="40" y="524" width="900" height="150" rx="13" fill="#0c1322" stroke="#1e293b"/>

  <rect x="64" y="548" width="270" height="104" rx="11" fill="#13233b" stroke="#1e3a5f"/>
  <text x="80" y="574" class="pt" font-size="13.5px">connect once</text>
  <text x="80" y="596" class="pw">open kRPC + bridge a single time;</text>
  <text x="80" y="612" class="pw">thread one live context (vessel,</text>
  <text x="80" y="628" class="pw">target, current body) through</text>
  <text x="80" y="644" class="pw">every primitive in order.</text>

  <rect x="356" y="548" width="270" height="104" rx="11" fill="#2a1c08" stroke="#5c3d10"/>
  <text x="372" y="574" class="pt" font-size="13.5px">bounded retry</text>
  <text x="372" y="596" class="pw">each step runs up to --max-attempts;</text>
  <text x="372" y="612" class="pw">a known/variance marker is retried,</text>
  <text x="372" y="628" class="pw">an unknown failure is not (it will not</text>
  <text x="372" y="644" class="pw">fix itself by repeating).</text>

  <rect x="648" y="548" width="270" height="104" rx="11" fill="#2a0d0d" stroke="#5c1a1a"/>
  <text x="664" y="574" class="pt" font-size="13.5px">fail fast + diagnose</text>
  <text x="664" y="596" class="pw">a failed primitive surfaces its</text>
  <text x="664" y="612" class="pw">mission_phase / RESULT:FAIL marker,</text>
  <text x="664" y="628" class="pw">gets a knowledge-base diagnosis,</text>
  <text x="664" y="644" class="pw">and ABORTS the mission &#8212; never hangs.</text>

  <!-- flight-order arrows -->
  <path d="M310,192 L355,192" stroke="#0d9488" stroke-width="2.4" fill="none" marker-end="url(#flow)"/>
  <path d="M625,192 L670,192" stroke="#0d9488" stroke-width="2.4" fill="none" marker-end="url(#flow)"/>
  <path d="M805,252 C805,300 690,310 648,344" stroke="#0d9488" stroke-width="2.4" fill="none" marker-end="url(#flow)"/>
  <text x="700" y="300" class="opt" fill="#5eead4">(round trip)</text>

  <!-- retry + fail markers around the body step -->
  <path d="M905,180 C950,210 950,150 912,150" stroke="#b45309" stroke-width="2.2" fill="none" stroke-dasharray="6 4" marker-end="url(#retry)"/>
  <text x="828" y="118" class="lab">retry on variance</text>
</svg>
