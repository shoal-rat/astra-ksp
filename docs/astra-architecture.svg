<svg viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/></marker>
    <radialGradient id="bg" cx="30%" cy="18%" r="105%"><stop offset="0%" stop-color="#0e1626"/><stop offset="100%" stop-color="#070b14"/></radialGradient>
    <linearGradient id="gCmd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#475569"/><stop offset="100%" stop-color="#334155"/></linearGradient>
    <linearGradient id="gBrain" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#5b21b6"/></linearGradient>
    <linearGradient id="gPrim" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="gExec" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9333ea"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="gMj" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#b45309"/></linearGradient>
    <linearGradient id="gKr" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0891b2"/><stop offset="100%" stop-color="#0e7490"/></linearGradient>
    <style>
      .title{font-size:17px;font-weight:800;fill:#f8fafc}.sub{font-size:12.5px;fill:#e2e8f0}
      .lab{font-size:11.5px;fill:#94a3b8;font-weight:600}.layer{font-size:12px;fill:#7c8aa0;font-weight:800;letter-spacing:.1em}
      .ctx{font-size:11.5px;fill:#0f172a;font-weight:700}.ctxs{font-size:10px;fill:#134e4a}
      .mod{font-size:13px;font-weight:800;fill:#ffffff}.modd{font-size:11px;fill:#ccfbf1}
      .prim{font-size:11px;fill:#ecfeff;font-weight:600}.tag{font-size:9.5px;font-weight:800;fill:#052e2b}
    </style>
  </defs>
  <rect x="0" y="0" width="1000" height="820" rx="16" fill="url(#bg)"/>

  <!-- 1. NL COMMAND -->
  <text x="40" y="30" class="layer">ONE NATURAL-LANGUAGE COMMAND</text>
  <rect x="40" y="42" width="920" height="54" rx="12" fill="url(#gCmd)" stroke="#1e293b"/>
  <text x="64" y="66" class="title" font-size="15px">PYTHONPATH=src python tools/astra.py "..."</text>
  <text x="64" y="86" class="sub">"put a relay in synchronous orbit around Duna"  &#183;  "land a crew on Gilly, plant a flag, bring them home"</text>

  <!-- 2. LLM MISSION ARCHITECT -->
  <text x="40" y="130" class="layer">LLM MISSION ARCHITECT  (interpreter.py &#8594; Anthropic API, ASTRA_MODEL)</text>
  <rect x="40" y="142" width="920" height="178" rx="12" fill="url(#gBrain)" stroke="#4c1d95"/>
  <text x="64" y="168" class="title">Claude REASONS over a rich planning context &#8212; decomposes AND calculates parameters</text>
  <text x="64" y="187" class="sub">Builds a planning context (planning_context.py), asks Claude to DECOMPOSE the goal into ordered primitive steps and</text>
  <text x="64" y="205" class="sub">CALCULATE each step's args (windows, altitudes, capture modes), then returns strict-JSON steps[] &#183; heuristic fallback.</text>

  <!-- 4 context blocks fed to the model -->
  <rect x="60"  y="222" width="212" height="84" rx="9" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="72" y="242" class="ctx">Primitive / action catalog</text>
  <text x="72" y="259" class="ctxs">12+ body-agnostic primitives,</text>
  <text x="72" y="273" class="ctxs">their args + what each wraps</text>
  <text x="72" y="293" class="ctxs">(the ONLY actions it may emit)</text>

  <rect x="282" y="222" width="212" height="84" rx="9" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="294" y="242" class="ctx">Bodies catalog (real const.)</text>
  <text x="294" y="259" class="ctxs">&#956; &#183; radius &#183; SOI &#183; sidereal</text>
  <text x="294" y="273" class="ctxs">atmosphere &#183; rotation</text>
  <text x="294" y="293" class="ctxs">synchronous &amp; low-orbit alt</text>

  <rect x="504" y="222" width="212" height="84" rx="9" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="516" y="242" class="ctx">Live universe state</text>
  <text x="516" y="259" class="ctxs">universe time &#183; every vessel's</text>
  <text x="516" y="273" class="ctxs">body / pe / ap / inclination</text>
  <text x="516" y="293" class="ctxs">+ active mass / &#916;v / resources</text>

  <rect x="726" y="222" width="214" height="84" rx="9" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="738" y="242" class="ctx">Calculation helpers (menu)</text>
  <text x="738" y="259" class="ctxs">find_transfer_window(dep,tgt)</text>
  <text x="738" y="273" class="ctxs">plan_ejection_node &#183; astro.*</text>
  <text x="738" y="293" class="ctxs">synchronous_altitude_m(body)</text>

  <!-- 3. DECOMPOSED PRIMITIVE STEPS -->
  <text x="40" y="354" class="layer">DECOMPOSED PRIMITIVE STEPS  (primitives.py)  &#8212;  atomic &#183; body-agnostic &#183; each WRAPS a proven driver</text>
  <rect x="40" y="366" width="920" height="116" rx="12" fill="url(#gPrim)" stroke="#115e59"/>
  <text x="64" y="390" class="mod">{"steps": [{"primitive": ..., "args": {...}, "reasoning": ...}], ...}  &#8212; validated against the catalog</text>

  <g>
    <rect x="60"  y="402" width="118" height="30" rx="7" fill="#0b4f49"/><text x="68" y="421" class="prim">launch</text>
    <rect x="186" y="402" width="118" height="30" rx="7" fill="#0b4f49"/><text x="194" y="421" class="prim">transfer</text>
    <rect x="312" y="402" width="118" height="30" rx="7" fill="#0b4f49"/><text x="320" y="421" class="prim">set_orbit</text>
    <rect x="438" y="402" width="118" height="30" rx="7" fill="#0b4f49"/><text x="446" y="421" class="prim">land</text>
    <rect x="564" y="402" width="118" height="30" rx="7" fill="#0b4f49"/><text x="572" y="421" class="prim">ascend</text>
    <rect x="690" y="402" width="118" height="30" rx="7" fill="#0b4f49"/><text x="698" y="421" class="prim">plant_flag</text>
    <rect x="816" y="402" width="124" height="30" rx="7" fill="#0b4f49"/><text x="824" y="421" class="prim">walk_to</text>

    <rect x="60"  y="440" width="118" height="30" rx="7" fill="#0b4f49"/><text x="68" y="459" class="prim">rendezvous</text>
    <rect x="186" y="440" width="118" height="30" rx="7" fill="#0b4f49"/><text x="194" y="459" class="prim">dock</text>
    <rect x="312" y="440" width="118" height="30" rx="7" fill="#0b4f49"/><text x="320" y="459" class="prim">transfer_crew</text>
    <rect x="438" y="440" width="118" height="30" rx="7" fill="#0b4f49"/><text x="446" y="459" class="prim">recover</text>
    <rect x="564" y="440" width="118" height="30" rx="7" fill="#0b4f49"/><text x="572" y="459" class="prim">commission_relay</text>
    <rect x="690" y="440" width="250" height="30" rx="7" fill="#0b4f49"/><text x="698" y="459" class="prim">select_vessel &#183; &#8230; (12+ in CATALOG)</text>
  </g>

  <!-- design gate (between plan and fly) -->
  <rect x="40" y="500" width="450" height="58" rx="12" fill="#13362f" stroke="#0d9488"/>
  <rect x="56" y="514" width="74" height="16" rx="8" fill="#a3e635"/><text x="62" y="526" class="tag">PNG GATE</text>
  <text x="140" y="520" class="sub" font-size="11.5px">launch is HARD-GATED on a three-view PNG render</text>
  <text x="140" y="538" class="lab" fill="#ccfbf1">design_and_verify &#8594; headless-Chrome PNG &#8594; looks_like_a_rocket</text>
  <text x="140" y="552" class="lab" fill="#fca5a5">no rocket shape &#8594; RESULT: FAIL, refuse to fly</text>

  <!-- executor -->
  <rect x="510" y="500" width="450" height="58" rx="12" fill="url(#gExec)" stroke="#5b21b6"/>
  <text x="534" y="522" class="title" font-size="14px">Executor (agent.py)</text>
  <text x="534" y="540" class="sub">connect ONCE &#183; thread a live context through every step</text>
  <text x="534" y="553" class="lab" fill="#ddd6fe">bounded retry &#183; per-step diagnosis &#183; FAIL FAST on a bad marker</text>

  <!-- DELEGATED CONTROL + TELEMETRY -->
  <text x="40" y="592" class="layer">ONE LIVE CONNECTION  &#8212;  kRPC  +  C# BRIDGE</text>
  <rect x="40" y="604" width="450" height="86" rx="12" fill="url(#gMj)" stroke="#92400e"/>
  <text x="64" y="630" class="title" font-size="15px">KspAutomationBridge  (HTTP 127.0.0.1:48500)</text>
  <text x="64" y="650" class="sub">MechJeb autopilots: ascent &#183; node &#183; rendezvous &#183; dock &#183; land &#183; plan</text>
  <text x="64" y="668" class="sub">EVA / personnel: eva-flag &#183; walk-to &#183; board &#183; spawn / transfer crew</text>
  <text x="64" y="684" class="sub">game-data read-back: vessel-info &#183; parts-list &#183; resources</text>

  <rect x="510" y="604" width="450" height="86" rx="12" fill="url(#gKr)" stroke="#155e75"/>
  <text x="534" y="630" class="title" font-size="15px">kRPC  (RPC 50000 / stream 50001)</text>
  <text x="534" y="650" class="sub">live &#956; &#183; radius &#183; SOI &#183; density &#183; orbit state</text>
  <text x="534" y="668" class="sub">position_at(ut) &#183; maneuver nodes &#183; warp &#183; save / load</text>
  <text x="534" y="684" class="sub">feeds the live universe state back to the architect</text>

  <!-- KSP -->
  <text x="40" y="724" class="layer">LIVE SIMULATOR</text>
  <rect x="40" y="736" width="920" height="56" rx="12" fill="url(#gCmd)" stroke="#1e293b"/>
  <text x="64" y="762" class="title" font-size="15px">Live Kerbal Space Program 1  (v1.12.5)</text>
  <text x="64" y="782" class="sub">where every decomposed primitive actually flies &#8212; relays, landers, crew, flags</text>

  <!-- flow arrows -->
  <path d="M500,96 L500,142"  stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M500,320 L500,366" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/><text x="510" y="338" class="lab">strict-JSON steps[]</text>
  <path d="M265,482 L265,500" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M735,482 L735,500" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M265,558 L265,604" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/><text x="275" y="578" class="lab">design + run step</text>
  <path d="M735,558 L735,604" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M265,690 L265,736" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/><text x="275" y="718" class="lab">commands ship</text>
  <path d="M735,736 L735,690" stroke="#22d3ee" stroke-width="2.2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowUp)"/><text x="745" y="718" class="lab" fill="#22d3ee">reads live state</text>
  <!-- live state fed back up to the architect (runs up the right gutter, clear of all labels) -->
  <path d="M952,604 C978,500 978,300 962,266" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowUp)"/>
  <text x="968" y="440" class="lab" fill="#22d3ee" transform="rotate(90 968 440)">live universe state to the architect</text>
</svg>
