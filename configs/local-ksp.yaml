bridge:
  base_url: "http://127.0.0.1:48500"
  timeout_s: 30

krpc:
  name: "ksp1-automation-lab"
  host: "127.0.0.1"
  rpc_port: 50000
  stream_port: 50001
  physics_warp_factor: 3
  max_launch_start_stages: 6
  min_autostage_stage: 2
  node_alignment_timeout_s: 25
  node_alignment_error_deg: 6
  bridge_base_url: "http://127.0.0.1:48500"
  bridge_timeout_s: 30
  mun_relay_target_apoapsis_m: 300000
  mun_relay_target_periapsis_m: 50000
  mun_relay_min_apoapsis_m: 250000
  mun_relay_min_periapsis_m: 50000
  mun_soi_correction_target_periapsis_m: 100000

paths:
  run_dir: "runs"
  database: "runs/trials.sqlite3"
  knowledge_base: "data/knowledge_base"
  ksp_save_ships_vab: "C:/Program Files (x86)/Steam/steamapps/common/Kerbal Space Program/saves/默认/Ships/VAB"

runner:
  max_trials: 25
  success_streak_required: 1
  revert_after_trial: false
  flight_timeout_s: 2400
  post_load_settle_s: 10
  scene_transition_timeout_s: 60
  # Wait for the editor ship to actually finish loading (loadedSceneIsEditor flips ~2s before the
  # parts are placed) before launching.
  craft_ready_timeout_s: 60
  scene_poll_s: 1.0
  # Editor->FLIGHT is slow for a heavy craft / slow scene load; give it a generous budget and re-issue
  # launch() once if the scene has not started transitioning, to ride out a silent launch no-op.
  launch_transition_timeout_s: 180
  relaunch_after_s: 20

optimizer:
  external_command: ""
  external_timeout_s: 120

craft_writer:
  template_path: "C:/Program Files (x86)/Steam/steamapps/common/Kerbal Space Program/Ships/VAB/PT Series Munsplorer.craft"
